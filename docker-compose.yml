version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: mindflow-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mindflow
      MYSQL_USER: mindflow_user
      MYSQL_PASSWORD: mindflow_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7.2-alpine
    container_name: mindflow-redis
    ports:
      - "6379:6379"

  pgvector:
    image: ankane/pgvector:v0.5.1
    container_name: mindflow-pgvector
    environment:
      POSTGRES_USER: pguser
      POSTGRES_PASSWORD: pgpassword
      POSTGRES_DB: vectordb
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mindflow-backend
    ports:
      - "8080:8080"
    depends_on:
      - mysql
      - redis
      - pgvector

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mindflow-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
  pg_data:
